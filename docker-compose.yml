version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: qstudio-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qstudio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qstudio_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-qstudio}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - qstudio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qstudio}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Queue
  redis:
    image: redis:7-alpine
    container_name: qstudio-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-qstudio_dev_redis}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - qstudio-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qstudio-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-qstudio}:${POSTGRES_PASSWORD:-qstudio_dev_password}@postgres:5432/${POSTGRES_DB:-qstudio}
      REDIS_URL: redis://:${REDIS_PASSWORD:-qstudio_dev_redis}@redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - qstudio-network
    volumes:
      - uploads:/app/uploads
      - exports:/app/exports
      - logs:/app/logs
    restart: unless-stopped

  # Next.js Frontend
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qstudio-web
    environment:
      # For browser access from outside: http://72.62.165.54:8000
      # For Docker internal access: http://api:8000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://72.62.165.54:8000}
      API_URL: ${API_URL:-http://api:8000}
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - qstudio-network
    volumes:
      - uploads:/app/uploads
      - exports:/app/exports
    restart: unless-stopped

  # Background Worker
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: qstudio-worker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-qstudio}:${POSTGRES_PASSWORD:-qstudio_dev_password}@postgres:5432/${POSTGRES_DB:-qstudio}
      REDIS_URL: redis://:${REDIS_PASSWORD:-qstudio_dev_redis}@redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - qstudio-network
    volumes:
      - uploads:/app/uploads
      - exports:/app/exports
      - logs:/app/logs
    restart: unless-stopped

  # Nginx Reverse Proxy (optional - can use web:3000 directly)
  # nginx:
  #   image: nginx:alpine
  #   container_name: qstudio-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - uploads:/var/www/uploads
  #     - exports:/var/www/exports
  #     - logs:/var/log/nginx
  #   depends_on:
  #     - web
  #     - api
  #   networks:
  #     - qstudio-network
  #   restart: unless-stopped

networks:
  qstudio-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local
  exports:
    driver: local
  logs:
    driver: local
